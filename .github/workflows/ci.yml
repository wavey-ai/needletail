name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown
      - run: scripts/validate-product-boundary.sh
      - run: cargo fmt --all -- --check
      - run: cargo check --locked --all-targets
      - run: cargo test --locked
      - run: cargo fmt --manifest-path mission-control/Cargo.toml --all -- --check
      - run: cargo check --manifest-path mission-control/Cargo.toml --locked --target wasm32-unknown-unknown
      - run: cargo test --manifest-path mission-control/Cargo.toml --locked
      - run: bash -n scripts/*.sh
      - run: bash -n mission-control/scripts/*.sh
      - run: scripts/realtime-benchmark.sh --help
      - run: scripts/realtime-qualification.sh --help
      - run: scripts/realtime-soak.sh --help
      - run: scripts/validate-observability.sh
