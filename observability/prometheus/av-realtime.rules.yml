groups:
  - name: needletail-realtime-recording
    interval: 15s
    rules:
      - record: av:contrib_forward_p50_seconds:5m
        expr: |
          histogram_quantile(
            0.50,
            sum by (job, instance, kind, le) (
              rate(av_contrib_mesh_forward_duration_seconds_bucket[5m])
            )
          )
      - record: av:contrib_forward_p95_seconds:5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, instance, kind, le) (
              rate(av_contrib_mesh_forward_duration_seconds_bucket[5m])
            )
          )
      - record: av:contrib_forward_p99_seconds:5m
        expr: |
          histogram_quantile(
            0.99,
            sum by (job, instance, kind, le) (
              rate(av_contrib_mesh_forward_duration_seconds_bucket[5m])
            )
          )
      - record: av:contrib_forward_stage_p50_seconds:5m
        expr: |
          histogram_quantile(
            0.50,
            sum by (job, instance, kind, stage, le) (
              rate(av_contrib_mesh_forward_stage_duration_seconds_bucket[5m])
            )
          )
      - record: av:contrib_forward_stage_p95_seconds:5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, instance, kind, stage, le) (
              rate(av_contrib_mesh_forward_stage_duration_seconds_bucket[5m])
            )
          )
      - record: av:contrib_forward_stage_p99_seconds:5m
        expr: |
          histogram_quantile(
            0.99,
            sum by (job, instance, kind, stage, le) (
              rate(av_contrib_mesh_forward_stage_duration_seconds_bucket[5m])
            )
          )
      - record: av:contrib_relay_stage_p50_seconds:5m
        expr: |
          histogram_quantile(
            0.50,
            sum by (job, instance, stage, le) (
              rate(av_contrib_relay_session_stage_duration_seconds_bucket[5m])
            )
          )
      - record: av:contrib_relay_stage_p95_seconds:5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, instance, stage, le) (
              rate(av_contrib_relay_session_stage_duration_seconds_bucket[5m])
            )
          )
      - record: av:contrib_relay_stage_p99_seconds:5m
        expr: |
          histogram_quantile(
            0.99,
            sum by (job, instance, stage, le) (
              rate(av_contrib_relay_session_stage_duration_seconds_bucket[5m])
            )
          )
      - record: av:mesh_edge_handler_p50_seconds:5m
        expr: |
          histogram_quantile(
            0.50,
            max by (node_id, region, le) (
              rate(av_mesh_edge_response_duration_seconds_bucket[5m])
            )
          )
      - record: av:mesh_edge_handler_p95_seconds:5m
        expr: |
          histogram_quantile(
            0.95,
            max by (node_id, region, le) (
              rate(av_mesh_edge_response_duration_seconds_bucket[5m])
            )
          )
      - record: av:mesh_edge_handler_p99_seconds:5m
        expr: |
          histogram_quantile(
            0.99,
            max by (node_id, region, le) (
              rate(av_mesh_edge_response_duration_seconds_bucket[5m])
            )
          )
      - record: av:mesh_relay_publication_to_available_p50_seconds:5m
        expr: |
          histogram_quantile(
            0.50,
            sum by (job, instance, le) (
              rate(av_mesh_relay_session_publication_to_available_us_bucket[5m])
            )
          ) / 1000000
      - record: av:mesh_relay_publication_to_available_p95_seconds:5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, instance, le) (
              rate(av_mesh_relay_session_publication_to_available_us_bucket[5m])
            )
          ) / 1000000
      - record: av:mesh_relay_publication_to_available_p99_seconds:5m
        expr: |
          histogram_quantile(
            0.99,
            sum by (job, instance, le) (
              rate(av_mesh_relay_session_publication_to_available_us_bucket[5m])
            )
          ) / 1000000
      - record: av:mesh_edge_requests_per_second:5m
        expr: |
          max by (node_id, region) (
            rate(av_mesh_edge_requests_total[5m])
          )
      - record: av:mesh_edge_error_ratio:5m
        expr: |
          max by (node_id, region) (
            rate(av_mesh_edge_responses_total{outcome="error"}[5m])
          )
          /
          clamp_min(
            max by (node_id, region) (
              rate(av_mesh_edge_responses_total{outcome="all"}[5m])
            ),
            0.001
          )
      - record: av:contrib_relay_objects_per_second:5m
        expr: |
          sum by (job, instance) (
            rate(av_contrib_relay_session_objects_total[5m])
          )
      - record: av:contrib_relay_datagrams_per_second:5m
        expr: |
          sum by (job, instance, role) (
            rate(av_contrib_relay_session_datagrams_total[5m])
          )
      - record: av:contrib_relay_lane_failures_per_second:5m
        expr: |
          sum by (job, instance, path) (
            rate(av_contrib_relay_session_lane_objects_total{outcome="failure"}[5m])
          )
      - record: av:contrib_relay_surviving_lane_objects_per_second:5m
        expr: |
          sum by (job, instance) (
            rate(av_contrib_relay_session_surviving_lane_objects_total[5m])
          )
      - record: av:contrib_relay_send_error_ratio:5m
        expr: |
          sum by (job, instance, role) (
            rate(av_contrib_relay_session_send_errors_total[5m])
          )
          /
          clamp_min(
            sum by (job, instance, role) (
              rate(av_contrib_relay_session_send_errors_total[5m])
            )
            +
            sum by (job, instance, role) (
              rate(av_contrib_relay_session_datagrams_total[5m])
            ),
            0.001
          )
      - record: av:contrib_relay_repair_to_source_ratio:5m
        expr: |
          sum by (job, instance) (
            rate(av_contrib_relay_session_datagrams_total{role="repair"}[5m])
          )
          /
          clamp_min(
            sum by (job, instance) (
              rate(av_contrib_relay_session_datagrams_total{role="source"}[5m])
            ),
            0.001
          )
      - record: av:mesh_relay_datagrams_per_second:5m
        expr: |
          sum by (job, instance, outcome) (
            rate(av_mesh_relay_session_datagrams_total[5m])
          )
      - record: av:mesh_relay_objects_per_second:5m
        expr: |
          sum by (job, instance, outcome) (
            rate(av_mesh_relay_session_objects_total[5m])
          )
      - record: av:mesh_relay_drops_per_second:5m
        expr: |
          sum by (job, instance, reason) (
            rate(av_mesh_relay_session_drops_total[5m])
          )
      - record: av:mesh_relay_expired_object_ratio:5m
        expr: |
          sum by (job, instance) (
            rate(av_mesh_relay_session_objects_total{outcome="expired"}[5m])
          )
          /
          clamp_min(
            sum by (job, instance) (
              rate(av_mesh_relay_session_objects_total{outcome=~"decoded|expired"}[5m])
            ),
            0.001
          )
      - record: av:mesh_relay_duplicate_datagram_ratio:5m
        expr: |
          sum by (job, instance) (
            rate(av_mesh_relay_session_datagrams_total{outcome="duplicate"}[5m])
          )
          /
          clamp_min(
            sum by (job, instance) (
              rate(av_mesh_relay_session_datagrams_total{outcome="received"}[5m])
            ),
            0.001
          )
      - record: av:mesh_relay_fec_recovery_object_ratio:5m
        expr: |
          sum by (job, instance) (
            rate(av_mesh_relay_session_objects_total{outcome="fec_recovered"}[5m])
          )
          /
          clamp_min(
            sum by (job, instance) (
              rate(av_mesh_relay_session_objects_total{outcome="decoded"}[5m])
            ),
            0.001
          )

  - name: needletail-realtime-alerts
    interval: 15s
    rules:
      - alert: AvContributorTargetDown
        expr: up{job="av-contrib"} == 0
        for: 1m
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Contributor metrics target is unavailable
          description: 'Prometheus has failed to scrape {{ $labels.instance }} for one minute.'
          runbook: Check av-contrib health, TLS, listener binding, and the Prometheus scrape target.

      - alert: AvMeshTargetDown
        expr: up{job="av-mesh"} == 0
        for: 1m
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Edge metrics target is unavailable
          description: 'Prometheus has failed to scrape {{ $labels.instance }} for one minute.'
          runbook: Check av-mesh health, TLS, listener binding, and the Prometheus scrape target.

      - alert: AvMeshPublicationToAvailableP95High
        expr: av:mesh_relay_publication_to_available_p95_seconds:5m > 0.5
        for: 5m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Publication-to-cache p95 is above 500 ms
          description: 'Canonical media on {{ $labels.instance }} reaches verified cache availability in {{ $value | humanizeDuration }} at p95.'
          runbook: Compare parent RTT, source/repair arrival, RaptorQ recovery, relay forwarding time, and deadline headroom.

      - alert: AvMeshPublicationClockErrorHigh
        expr: av_mesh_relay_session_publication_clock_error_max_us > 50000
        for: 5m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Publication latency clock uncertainty exceeds 50 ms
          description: 'The source timestamp error bound observed by {{ $labels.instance }} is {{ $value }} microseconds.'
          runbook: Restore host clock synchronization and verify the canonical media clock confidence before using end-to-end latency for routing decisions.

      - alert: AvContributorPathObservationStale
        expr: av_contrib_relay_session_route_observation_age_seconds > 300
        for: 1m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Adaptive RaptorQ path observation is stale
          description: 'The {{ $labels.path }} path input on {{ $labels.instance }} is {{ $value | humanizeDuration }} old.'
          runbook: Refresh the controller route observation and verify RTT, jitter, loss, and queue-delay probes are advancing.

      - alert: AvContributorPathStretchHigh
        expr: av_contrib_relay_session_route_stretch_ratio > 1.15
        for: 1m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Selected media route exceeds the interactive path-stretch bound
          description: 'The {{ $labels.path }} route on {{ $labels.instance }} is {{ $value }}x the fastest measured direct RTT.'
          runbook: Re-score the route, prefer a direct or one-hop lane, and make-before-break to a warm path below 1.15x.

      - alert: AvContributorForwardingP95High
        expr: av:contrib_forward_p95_seconds:5m{kind="stream"} > 0.015
        for: 5m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Contributor forwarding p95 is above 15 ms
          description: 'Forwarding p95 on {{ $labels.instance }} is {{ $value | humanizeDuration }}.'
          runbook: Inspect the forwarding-stage quantiles; encode_wait indicates contention, encode indicates RaptorQ CPU, and send indicates carrier pressure.

      - alert: AvContributorForwardingP99High
        expr: av:contrib_forward_p99_seconds:5m{kind="stream"} > 0.025
        for: 5m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Contributor forwarding p99 is above 25 ms
          description: 'Forwarding p99 on {{ $labels.instance }} is {{ $value | humanizeDuration }}.'
          runbook: Compare the p50, p95, and p99 stage lines and inspect CPU scheduling, symbol encoding, and carrier pacing.

      - alert: AvContributorRelayStageP99High
        expr: av:contrib_relay_stage_p99_seconds:5m > 0.010
        for: 2m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Contributor RelaySession stage p99 exceeds 10 ms
          description: '{{ $labels.stage }} p99 on {{ $labels.instance }} is {{ $value | humanizeDuration }}.'
          runbook: Separate encoder lock wait, RaptorQ encode, source-first scheduling, and the primary or warm carrier send stage; then inspect CPU contention and socket pressure for the elevated line.

      - alert: AvContributorRelayPrimaryMissing
        expr: av_contrib_relay_session_carrier_configured{path="primary"} < 1
        for: 1m
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Contributor primary RelaySession carrier is absent
          description: '{{ $labels.instance }} has no configured primary source-symbol carrier.'
          runbook: Apply the controller assignment, verify the fixed bind and target, then confirm source datagrams advance.

      - alert: AvContributorRelaySecondaryMissing
        expr: av_contrib_relay_session_carrier_configured{path="secondary"} < 1
        for: 1m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Contributor warm secondary RelaySession carrier is absent
          description: '{{ $labels.instance }} has no configured secondary repair-symbol carrier.'
          runbook: Verify the secondary assignment and failure-domain path, then confirm repair datagrams advance independently.

      - alert: AvContributorRelayEncodeErrors
        expr: increase(av_contrib_relay_session_encode_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Canonical objects failed RaptorQ encoding
          description: '{{ $labels.instance }} rejected one or more canonical objects during RelaySession encoding.'
          runbook: Inspect object envelope bounds, RaptorQ geometry, media-object metadata, and process logs.

      - alert: AvContributorRelaySendErrors
        expr: increase(av_contrib_relay_session_send_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: RelaySession symbol send errors detected
          description: '{{ $labels.instance }} recorded {{ $labels.role }} symbol send failures.'
          runbook: Inspect lane-object outcomes to identify the failed parent; verify the surviving lane, fixed source bind, target reachability, socket pressure, and path MTU.

      - alert: AvContributorRelayLaneFailure
        expr: increase(av_contrib_relay_session_lane_objects_total{outcome="failure"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Contributor parent lane is degraded
          description: '{{ $labels.instance }} failed one or more canonical objects on the {{ $labels.path }} parent lane.'
          runbook: Verify the independent parent path and confirm surviving-lane deliveries continue before replacing the degraded route make-before-break.

      - alert: AvContributorRelayLaneImpaired
        expr: av_contrib_relay_session_lane_health{state="impaired"} == 1
        for: 15s
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Contributor parent lane remains impaired
          description: '{{ $labels.instance }} currently reports the {{ $labels.path }} parent lane as impaired.'
          runbook: Verify the independent parent path while confirming the healthy complete lane continues delivery; replace the impaired route make-before-break.

      - alert: AvContributorRelayAllLanesFailed
        expr: increase(av_contrib_relay_session_all_lanes_failed_objects_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Every complete contributor parent lane failed
          description: '{{ $labels.instance }} could not emit one or more canonical objects on any complete configured RelaySession lane.'
          runbook: Restore either source-capable parent immediately, then inspect carrier errors, topology assignment, and deadline headroom.

      - alert: AvContributorRelayDeadlineMiss
        expr: increase(av_contrib_relay_session_deadline_objects_total{outcome="miss"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Contributor object emission missed its media deadline
          description: '{{ $labels.instance }} recorded {{ $value }} canonical object emission deadline misses in five minutes.'
          runbook: Compare total, encode, schedule, and carrier-send p99 with the deadline budget; reduce queueing or repair load and drop obsolete symbols immediately.

      - alert: AvContributorDeadlineHeadroomLow
        expr: |
          (
            av_contrib_relay_session_last_deadline_headroom_seconds
            < on (job, instance)
            (av_contrib_relay_session_deadline_budget_seconds * 0.10)
          )
          and on (job, instance)
          (
            av_contrib_last_seen_age_seconds{stage="fmp4_output"}
            < on (job, instance)
            (av_contrib_relay_session_deadline_budget_seconds * 2)
          )
        for: 1m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: RelaySession emission consumed most of the object deadline
          description: '{{ $labels.instance }} has {{ $value | humanizeDuration }} headroom after successful emission.'
          runbook: Inspect stage p99, queueing, RaptorQ geometry, carrier pacing, and the configured deadline budget.

      - alert: AvContributorClockEstimateConsumesDeadline
        expr: |
          av_contrib_media_object_clock_estimated_error_seconds
          > on (job, instance)
          (av_contrib_relay_session_deadline_budget_seconds * 0.10)
        for: 5m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Canonical timestamp uncertainty exceeds ten percent of the deadline
          description: '{{ $labels.instance }} reports {{ $value | humanizeDuration }} maximum estimated clock error.'
          runbook: Qualify host time synchronization and lower the configured estimate only when measured clock evidence supports it.

      - alert: AvMeshRelayPrimaryMissing
        expr: av_mesh_relay_session_parent_sessions{role="primary"} < 1
        for: 1m
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Edge primary RelaySession parent is absent
          description: '{{ $labels.instance }} has no active primary parent assignment.'
          runbook: Inspect the controller generation, subscription, fixed source binding, and parent reachability.

      - alert: AvMeshRelaySecondaryMissing
        expr: av_mesh_relay_session_parent_sessions{role="secondary"} < 1
        for: 1m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Edge warm secondary RelaySession parent is absent
          description: '{{ $labels.instance }} has no warm secondary parent assignment.'
          runbook: Restore the independent secondary assignment before failover or path-loss qualification.

      - alert: AvMeshRelayFailoverSecondaryUnavailable
        expr: av_mesh_relay_failover_state{state="secondary_unavailable"} == 1
        for: 15s
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Primary source is silent and the warm secondary is unavailable
          description: '{{ $labels.instance }} cannot promote because no recent secondary repair symbol proves the warm path is ready.'
          runbook: Restore the secondary repair lane, verify its independent route and subscription, then confirm repair age falls below the configured warm window.

      - alert: AvMeshRelayFailoverControlErrors
        expr: increase(av_mesh_relay_failover_commands_total{outcome=~"error|rejected"}[5m]) > 0
        for: 15s
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Warm-secondary failover control commands are failing
          description: '{{ $labels.instance }} recorded {{ $value }} failed or rejected failover commands in five minutes.'
          runbook: Check controller/listener identity, topology generation, subscription, exact control addresses, and carrier reachability.

      - alert: AvMeshRelayFailoverLeaseExpired
        expr: increase(av_mesh_relay_failover_lease_expirations_total[5m]) > 0
        for: 15s
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: A promoted warm-secondary forwarding lease expired
          description: '{{ $labels.instance }} safely returned a child to repair-only after losing controller heartbeats.'
          runbook: Restore controller heartbeats before the next primary failure and verify heartbeat interval remains below one third of the lease.

      - alert: AvMeshRelayFailoverActivationSlow
        expr: av_mesh_relay_failover_last_promotion_to_source_us > 250000
        for: 15s
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Warm-secondary source activation exceeded 250 ms
          description: '{{ $labels.instance }} took {{ $value }} microseconds from promotion command to admitted secondary source.'
          runbook: Inspect control-path RTT, warm relay scheduling, bounded queues, and secondary source-symbol availability.

      - alert: AvMeshRelayFailoverMediaGapHigh
        expr: av_mesh_relay_failover_last_media_gap_us > 250000
        for: 15s
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Automatic failover cache-completion gap exceeded 250 ms
          description: '{{ $labels.instance }} observed a {{ $value }} microsecond media completion gap across failover.'
          runbook: Compare detection time, promotion-to-source time, RaptorQ repair availability, object deadlines, and the LL-HLS part target.

      - alert: AvMeshControlledQualificationBoundaryActive
        expr: av_mesh_relay_session_security_sessions{mode="controlled_qualification"} > 0
        for: 5m
        labels:
          severity: info
          slo: provisional
        annotations:
          summary: Controlled qualification carrier boundary is active
          description: '{{ $labels.instance }} has {{ $value }} controlled-qualification RelaySession bindings.'
          runbook: Record this boundary in qualification results; promotion requires authenticated carrier sessions.

      - alert: AvMeshRelayConflictDrops
        expr: increase(av_mesh_relay_session_drops_total{reason="conflict"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Canonical object identity conflicts detected
          description: '{{ $labels.instance }} rejected conflicting RelaySession object metadata.'
          runbook: Compare parent announcements, topology generations, subscription identities, and canonical envelope hashes.

      - alert: AvMeshRelayAuthenticationDrops
        expr: increase(av_mesh_relay_session_drops_total{reason="authentication"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: RelaySession authentication drops detected
          description: '{{ $labels.instance }} rejected traffic outside its established trust boundary.'
          runbook: Inspect peer identity, authorization, subscription, generation, and carrier-session state.

      - alert: AvMeshRelayDeadlineDrops
        expr: increase(av_mesh_relay_session_drops_total{reason="deadline"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Obsolete RelaySession symbols were dropped at the edge
          description: '{{ $labels.instance }} discarded symbols after their media deadline.'
          runbook: Compare deadline headroom, parent path health, source/repair arrival rates, and active-object pressure.

      - alert: AvMeshRelayObjectsExpiring
        expr: av:mesh_relay_expired_object_ratio:5m > 0.001
        for: 5m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: RelaySession object expiry ratio is elevated
          description: '{{ $labels.instance }} is expiring {{ $value | humanizePercentage }} of terminal objects.'
          runbook: Compare source/repair rates, secondary health, RaptorQ recovery, deadline drops, loss, jitter, and active objects.

      - alert: AvMeshRelayDuplicateRatioHigh
        expr: av:mesh_relay_duplicate_datagram_ratio:5m > 0.05
        for: 5m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: RelaySession duplicate datagram ratio is above five percent
          description: '{{ $labels.instance }} is receiving {{ $value | humanizePercentage }} duplicate datagrams.'
          runbook: Inspect parent symbol assignments, replay filtering, make-before-break overlap, and retransmit behavior.

      - alert: AvMeshRelayObjectsStalled
        expr: |
          av_mesh_relay_session_active_objects > 0
          and on (job, instance)
          increase(av_mesh_relay_session_objects_total{outcome="decoded"}[2m]) == 0
        for: 2m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Active RelaySession objects have made no decode progress
          description: '{{ $labels.instance }} retains incomplete objects without a completion in the last two minutes.'
          runbook: Inspect source and repair arrival, buffered datagrams, parent sessions, deadline drops, and object expiry.

      - alert: AvMeshCanonicalEpochActivationSlow
        expr: av_mesh_canonical_epoch_activation_delay_max_seconds > 10
        for: 15s
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Canonical source epoch took too long to activate
          description: 'The slowest visible relay took {{ $value }} seconds from contributor incarnation creation to first canonical object activation.'
          runbook: Inspect contributor restart time, first ingest publication, relay path RTT, source/repair scheduling, and clock confidence on every visible node.

      - alert: AvMeshCanonicalEpochDivergence
        expr: av_mesh_canonical_epoch_divergent_streams > 0
        for: 15s
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Relay nodes disagree on the active canonical source epoch
          description: '{{ $value }} stream(s) remain split across contributor source incarnations on {{ $labels.instance }}.'
          runbook: Verify contributor restart propagation, reject stale-epoch objects, and confirm every relay atomically switched its stream publication window.

      - alert: AvMeshCanonicalPublicationGap
        expr: av_mesh_stream_known_gap_count > 0
        for: 15s
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Canonical LL-HLS publication has a persistent object gap
          description: '{{ $labels.node_id }} retains {{ $value }} missing canonical object(s) for stream {{ $labels.stream_id }}.'
          runbook: Inspect RaptorQ expiry, parent-path health, reliable object recovery, and the subscriber publication base before serving this stream.

      - alert: AvMeshEdgeHandlerP95High
        expr: av:mesh_edge_handler_p95_seconds:5m > 0.001
        for: 5m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Edge LL-HLS handler p95 is above 1 ms
          description: 'Handler p95 for {{ $labels.node_id }} in {{ $labels.region }} is {{ $value | humanizeDuration }}.'
          runbook: Check contiguous publication, cache contention, CPU saturation, and response error ratio.

      - alert: AvMeshEdgeHandlerP99High
        expr: av:mesh_edge_handler_p99_seconds:5m > 0.0025
        for: 5m
        labels:
          severity: warning
          slo: provisional
        annotations:
          summary: Edge LL-HLS handler p99 is above 2.5 ms
          description: 'Handler p99 for {{ $labels.node_id }} in {{ $labels.region }} is {{ $value | humanizeDuration }}.'
          runbook: Compare p50, p95, and p99, then inspect cache locking, publication gaps, and CPU scheduling.

      - alert: AvMeshEdgeErrorRatioHigh
        expr: av:mesh_edge_error_ratio:5m > 0.001
        for: 5m
        labels:
          severity: critical
          slo: provisional
        annotations:
          summary: Edge LL-HLS response error ratio is elevated
          description: '{{ $labels.node_id }} in {{ $labels.region }} has {{ $value | humanizePercentage }} errors.'
          runbook: Inspect response outcomes, stream freshness, contiguous publication, cache availability, and node health.
